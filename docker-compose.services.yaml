include:
  - docker-compose.tools.yaml

services:
  algashop-ordering:
    image: algashop/ordering:dev
    restart: no
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"
    depends_on:
      algashop-postgres:
        condition: service_healthy
      algashop-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  algashop-billing:
    image: algashop/billing:dev
    restart: no
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8080"
    depends_on:
      algashop-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  algashop-product-catalog:
    image: algashop/product-catalog:dev
    restart: no
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8083:8080"
    depends_on:
      algashop-mongodb-1:
        condition: service_healthy
      algashop-mongodb-2:
        condition: service_healthy
      algashop-mongodb-3:
        condition: service_healthy
      algashop-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M