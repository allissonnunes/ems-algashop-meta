services:
  wiremock:
    image: wiremock/wiremock:3x
    command: --verbose
    ports:
      - "8787:8080"
    volumes:
      - ./.docker/wiremock:/home/wiremock/mappings

  algashop-postgres:
    image: postgres:18-alpine
    restart: always
    shm_size: 128mb
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - algashop-postgres:/var/lib/postgresql
      - .docker/postgres/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  fastpay:
    image: algaworks/fastpay:latest
    restart: no
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      FASTPAY_HOSTNAME: http://localhost:9995
      DATABASE_JDBC_URL: jdbc:postgresql://algashop-postgres:5432/fastpay
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: docker
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration,classpath:db/testdata
    ports:
      - "9995:9995"
    depends_on:
      algashop-postgres:
        condition: service_healthy

  algashop-mongodb-1:
    image: mongo:8
    command: [ "mongod", "--port", "27017", "--replSet", "rs0", "--bind_ip_all" ]
    restart: no
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "27017:27017"
    volumes:
      - algashop-mongodb-1:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--port", "27017", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  algashop-mongodb-2:
    image: mongo:8
    command: [ "mongod", "--port", "27018", "--replSet", "rs0", "--bind_ip_all" ]
    restart: no
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "27018:27018"
    volumes:
      - algashop-mongodb-2:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  algashop-mongodb-3:
    image: mongo:8
    command: [ "mongod", "--port", "27019", "--replSet", "rs0", "--bind_ip_all" ]
    restart: no
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "27019:27019"
    volumes:
      - algashop-mongodb-3:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  algashop-mongodb-init:
    image: mongo:8
    restart: no
    depends_on:
      algashop-mongodb-1:
        condition: service_healthy
      algashop-mongodb-2:
        condition: service_healthy
      algashop-mongodb-3:
        condition: service_healthy
    entrypoint: [ "bash", "-c" ]
    command: >
      "
      echo 'Initializing replica set...';
      
      mongosh --host algashop-mongodb-1 --eval '
        rs.initiate({
           _id: \"rs0\",
           members: [
             { _id: 0, host: \"host.docker.internal:27017\" },
             { _id: 1, host: \"host.docker.internal:27018\" },
             { _id: 2, host: \"host.docker.internal:27019\" }
           ]
        })
      ' || true;
      
      mongosh --host algashop-mongodb-1 --eval 'printjson(rs.status())'
      "

volumes:
  algashop-postgres:
  algashop-mongodb-1:
  algashop-mongodb-2:
  algashop-mongodb-3: